[openocd]
host = localhost
port = 4444

[serial]
port        = /dev/ttyUSB0
baud        = 115200
timeout_min = 5

[jtag]
uboot_ram_addr = 0x80200000
chip_id_addr   = 0x10000000
chip_id_magic  = 0x3637544d
staging_addr   = 0x81000000

[nor]
sector_size_kb      = 4
flashrom_programmer = ch341a_spi

[paths]
mkenvimage      = u-boot/tools/mkenvimage
uboot_dtb       = u-boot/u-boot.dtb
dtb_parts_path  = /palmbus@10000000/spi@b00/flash@0/partitions
openwrt_dtb     = openwrt/build_dir/target-mipsel_24kc_musl/linux-ramips_mt76x8/image-mt7628an_bodybytes_bodybytes.dtb
dtb_cal_eeprom  = /palmbus@10000000/spi@b00/flash@0/partitions/partition@50000/nvmem-layout/eeprom@0
uboot_defconfig = u-boot/generated_defconfig
uboot_bin       = u-boot/u-boot-with-spl.bin
uboot_ram_bin   = u-boot/u-boot.bin
uboot_env_txt   = u-boot/board/bodybytes/bodybytes/bodybytes.env
recovery_bin    = openwrt/bin/targets/ramips/mt76x8/openwrt-*-ramips-mt76x8-bodybytes_bodybytes_recovery-squashfs-recovery.bin
nor_image       = build/bodybytes_nor_image.bin

[board:bodybytes]
dram_size_mb      = 256
nor_total_size_mb = 64
nor_chip_name     = W25Q512JV
emmc_capacity_gb  = 128
reset_config      = trst_only
halt_cmd          = halt
# 1T1R via WF0 only (SR4W035 chip antenna). TSSI compensation left disabled (reset) until TX0_POWER
# is calibrated — closed-loop control against an uncalibrated target is worse than open-loop.
wifi_nic_confg_0     = 11 34
wifi_tx0_pa_tssi_msb = ca
wifi_tx1_pa_tssi_msb = ca

[board:vocore2]
dram_size_mb      = 128
nor_total_size_mb = 32
nor_chip_name     = W25Q256FV
emmc_capacity_gb  = 32
reset_config      = trst_and_srst separate srst_nogate connect_assert_srst
halt_cmd          = reset halt
# 1T1R: WF0 active (ceramic SMT antenna), WF1 routed to U.FL but disabled. TSSI temperature
# compensation enabled. TX power set to 30 units at 54 Mbps with per-chain per-channel flatness
# corrections (TX1 carries ±0.5 dBm chain asymmetry) and a power taper (+2 dBm on lower OFDM/HT
# rates, baseline at highest rates). Crystal re-trimmed +14 cap steps above OTP.
wifi_nic_confg_0         = 11 34
wifi_nic_confg_1         = 00 20
wifi_tx0_pa_tssi_msb     = ca
wifi_tx0_power           = 1e
wifi_tx0_pwr_ofst_l      = 80
wifi_tx0_pwr_ofst_m      = c0
wifi_tx0_pwr_ofst_h      = c0
wifi_tx1_pa_tssi_msb     = ca
wifi_tx1_power           = 1e
wifi_tx1_pwr_ofst_l      = 81
wifi_tx1_pwr_ofst_m      = c0
wifi_tx1_pwr_ofst_h      = c1
wifi_tx_pwr_ofdm_0       = c4
wifi_tx_pwr_ofdm_1       = c4
wifi_tx_pwr_ofdm_2       = c4
wifi_tx_pwr_ofdm_3       = c0
wifi_tx_pwr_ofdm_4       = c0
wifi_tx_pwr_ht_mcs_0     = c4
wifi_tx_pwr_ht_mcs_1     = c4
wifi_tx_pwr_ht_mcs_2     = c4
wifi_tx_pwr_ht_mcs_3     = c4
wifi_tx_pwr_ht_mcs_4     = c4
wifi_tx_pwr_ht_mcs_5     = c0
wifi_tx_pwr_ht_mcs_6     = c0
wifi_xtal_trim2          = 8e
wifi_xtal_trim3          = 80
# eFuse-merged at probe - driver overwrites from OTP; NOR value is a placeholder (from stock backup):
#wifi_temp_sen_cal        = b6
#wifi_efuse_cp_ft_version = 02
#wifi_xtal_cal            = bc
#wifi_efuse_xtal_wf_rfcal = 88
# Unknown blobs from stock NOR - purpose unclear, may be driver-version-specific (preserved for reference):
#wifi_eeprom_0xf8         = 0a 00
#wifi_eeprom_0x12e        = 77 00
#wifi_eeprom_0xe0         = 11 1d 11 1d 1c 35 1c 35 1e 35 1e 35 17 19 17 19
#wifi_eeprom_0x130        = 11 1d 11 1d 15 7f 15 7f 17 7f 17 7f 10 3b 10 3b
#wifi_eeprom_0x144        = 11 00
